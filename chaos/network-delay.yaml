apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: pagamento-network-delay
  namespace: app
  labels:
    app.kubernetes.io/name: pagamento
    chaos-test: "true"
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - app
    labelSelectors:
      app: pagamento
  delay:
    latency: "100ms"
    correlation: "0.5"
    jitter: "20ms"
  duration: "120s"
  scheduler:
    cron: "@every 10m"
